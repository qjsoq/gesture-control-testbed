version: 1

source:
  type: webcam
  device_index: 0
  resolution: [1280, 720]

recognizer:
  type: two_stage
  extractor:
    type: mediapipe_hands
    max_hands: 1
    min_detection_confidence: 0.6
    min_tracking_confidence: 0.5
  classifier:
    type: rule_based

runtime:
  log_level: INFO
  log_fps_every: 100
